name: release-ios

# iOS TestFlight release pipeline.
#
# Triggers:
#   - workflow_dispatch — manual button in the Actions UI
#   - release.published — auto-uploads when a GitHub Release tag is created
#
# Required GitHub Secrets:
#   APPLE_TEAM_ID                    — 10-char team identifier from
#                                       https://developer.apple.com/account
#                                       (e.g. ABCDE12345)
#   APPLE_CERTIFICATE_P12            — base64-encoded .p12 distribution
#                                       cert exported from Keychain Access
#                                       (single line, no newlines)
#   APPLE_CERTIFICATE_PASSWORD       — password set when exporting .p12
#   APPLE_PROVISIONING_PROFILE       — base64-encoded
#                                       .mobileprovision matching bundle id
#                                       com.awatv.awatvMobile, type
#                                       App Store
#   APP_STORE_CONNECT_API_KEY_ID     — 10-char key id from App Store
#                                       Connect → Users and Access →
#                                       Integrations → App Store Connect API
#   APP_STORE_CONNECT_ISSUER_ID      — UUID issuer id, same screen
#   APP_STORE_CONNECT_API_KEY_BASE64 — base64-encoded AuthKey_<KEYID>.p8
#                                       (single line, no newlines)
#
# Reuses (from existing release-desktop.yml workflow):
#   SUPABASE_URL
#   SUPABASE_ANON_KEY
#
# Bundle:
#   - Bundle ID: com.awatv.awatvMobile (registered in App Store Connect)
#   - Build name from pubspec.yaml `version: x.y.z+build`
#   - .ipa exported via flutter build ipa with ExportOptions.plist
#   - Uploaded to TestFlight via xcrun altool with API key
#
# To encode binary files for the secret values, on your Mac:
#   base64 -i path/to/cert.p12 | pbcopy
#   base64 -i path/to/profile.mobileprovision | pbcopy
#   base64 -i path/to/AuthKey_XXX.p8 | pbcopy

on:
  workflow_dispatch:
    inputs:
      build_number_suffix:
        description: 'Optional suffix appended to build number (e.g. timestamp)'
        required: false
        default: ''
  release:
    types: [published]

concurrency:
  group: release-ios
  cancel-in-progress: false

permissions:
  contents: write

env:
  FLUTTER_VERSION: 3.41.7

jobs:
  build-and-upload:
    name: Build .ipa + upload to TestFlight
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve workspace dependencies
        run: flutter pub get

      - name: Run code generation
        run: |
          (cd packages/awatv_core && dart run build_runner build --delete-conflicting-outputs)
          (cd apps/mobile && dart run build_runner build --delete-conflicting-outputs)

      # ----------------------------------------------------------------------
      # Bake .env from secrets so flutter_dotenv pulls Supabase config from
      # GitHub secrets at build time. Same pattern as release-desktop.yml.
      # ----------------------------------------------------------------------
      - name: Bake .env from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cd apps/mobile
          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}"
            cat .env.example | grep -v '^SUPABASE_URL=' | grep -v '^SUPABASE_ANON_KEY=' | grep -v '^$'
          } > .env

      # ----------------------------------------------------------------------
      # Set up a temporary keychain so the .p12 cert can be imported without
      # touching the runner's login keychain. The keychain is destroyed after
      # the job (runner is ephemeral), but we still scope-lock the partition
      # so codesign can use the cert non-interactively.
      # ----------------------------------------------------------------------
      - name: Set up signing keychain + import .p12
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 7200 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo -n "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          rm "$RUNNER_TEMP/cert.p12"

          security set-key-partition-list \
            -S "apple-tool:,apple:,codesign:" \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security find-identity -p codesigning -v "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo -n "$APPLE_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_DIR/awatv.mobileprovision"

          # Validate + extract UUID for diagnostics
          PROFILE_PLIST=$(security cms -D -i "$PROFILE_DIR/awatv.mobileprovision")
          UUID=$(echo "$PROFILE_PLIST" | /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)
          NAME=$(echo "$PROFILE_PLIST" | /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin)
          BUNDLE=$(echo "$PROFILE_PLIST" | /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /dev/stdin)
          echo "Profile: $NAME"
          echo "UUID:    $UUID"
          echo "App ID:  $BUNDLE"

      - name: Render ExportOptions.plist with team id
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd apps/mobile/ios
          # Substitute team ID into the template — env-passed value, no
          # injection vector since APPLE_TEAM_ID comes from a verified
          # GitHub secret rather than user-supplied event payload.
          sed "s|TEAM_ID_PLACEHOLDER|${APPLE_TEAM_ID}|" ExportOptions.template.plist > ExportOptions.plist
          cat ExportOptions.plist

      # ----------------------------------------------------------------------
      # Optional build_number suffix — when set, lets a manual rebuild upload
      # a fresh build number to TestFlight without bumping pubspec. Pulled
      # via env: rather than ${{ }} interpolation so untrusted input never
      # lands inside a `run:` script body unescaped.
      # ----------------------------------------------------------------------
      - name: Apply build number suffix
        if: ${{ inputs.build_number_suffix != '' }}
        env:
          BUILD_SUFFIX: ${{ inputs.build_number_suffix }}
        run: |
          cd apps/mobile
          # Validate the suffix is alphanumeric / digits only — anything
          # else (slashes, backticks, $) gets rejected here so sed below
          # can never pick up something it shouldn't.
          if ! [[ "$BUILD_SUFFIX" =~ ^[A-Za-z0-9]+$ ]]; then
            echo "::error::build_number_suffix must be alphanumeric, got: $BUILD_SUFFIX"
            exit 1
          fi
          CURRENT=$(grep -E '^version: ' pubspec.yaml | awk '{print $2}')
          NAME="${CURRENT%%+*}"
          NUM="${CURRENT##*+}"
          NEW="${NAME}+${NUM}${BUILD_SUFFIX}"
          sed -i.bak "s|^version: .*|version: ${NEW}|" pubspec.yaml
          rm -f pubspec.yaml.bak
          echo "Bumped pubspec to: ${NEW}"

      - name: Build .ipa
        run: |
          cd apps/mobile
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist \
            --no-tree-shake-icons

      - name: Upload .ipa as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: awatv-ios-ipa
          path: apps/mobile/build/ios/ipa/*.ipa
          if-no-files-found: error

      # ----------------------------------------------------------------------
      # Upload to TestFlight via xcrun altool with App Store Connect API key.
      # The .p8 file must live at ~/.appstoreconnect/private_keys/AuthKey_<KEYID>.p8
      # for altool to find it without an explicit path argument.
      # ----------------------------------------------------------------------
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode \
            > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

          IPA=$(find apps/mobile/build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "::error::No .ipa produced — check the build step"
            exit 1
          fi
          echo "Uploading $IPA to TestFlight…"

          xcrun altool --upload-app \
            -f "$IPA" \
            --type ios \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      # ----------------------------------------------------------------------
      # Attach the .ipa to the GitHub Release if this run was triggered by a
      # release.published event. Manual workflow_dispatch runs skip this so
      # we don't accidentally overwrite a tagged release.
      # ----------------------------------------------------------------------
      - name: Attach .ipa to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          IPA=$(find apps/mobile/build/ios/ipa -name "*.ipa" | head -1)
          gh release upload "$RELEASE_TAG" "$IPA" --clobber
