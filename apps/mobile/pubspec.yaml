name: awatv_mobile
description: AWAtv mobile app (iOS + Android — Phase 1).
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Workspace packages
  awatv_core:
    path: ../../packages/awatv_core
  awatv_ui:
    path: ../../packages/awatv_ui
  awatv_player:
    path: ../../packages/awatv_player

  # State management & routing
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3

  # Network & images
  dio: ^5.7.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # QR generation for the remote-control pairing screen.
  qr_flutter: ^4.1.0

  # Env / i18n
  flutter_dotenv: ^5.2.1
  intl: ^0.20.0

  # Runtime translation lookup. JSON dictionaries live under
  # `assets/i18n/` and are loaded via `EasyLocalization.ensureInitialized`
  # in main.dart. The framework persists the active locale to the
  # `EasyLocalization` shared-prefs slot, so the user's last pick survives
  # cold starts. Default & fallback locale is Turkish; English is the
  # secondary supported locale. Adding more languages is a matter of
  # dropping a `<code>.json` next to en.json + updating supportedLocales.
  easy_localization: ^3.0.7

  # Auth / cloud sync (optional — only enabled when SUPABASE_URL is set).
  supabase_flutter: ^2.8.0

  # Utils
  uuid: ^4.5.1
  collection: ^1.18.0
  cupertino_icons: ^1.0.8

  # Cryptographic helpers — sha256 for the auto-update integrity check.
  # awatv_core already depends on this, but the mobile app uses it
  # directly in `updater_service.dart`, so list it explicitly here.
  crypto: ^3.0.5

  # Reads CFBundleShortVersionString / FileDescription on every platform
  # so the in-app updater can compare against the GitHub release manifest.
  package_info_plus: ^9.0.1

  # Desktop window control (macOS / Windows / Linux). Mobile platforms do
  # not link this; Flutter's conditional plugin tooling handles it.
  window_manager: ^0.4.2

  # System tray icon + menu (macOS / Windows). Linux is gated off in
  # AwaTvTray.initialise because libappindicator availability is
  # distro-dependent and a missing native dep must not block the boot.
  tray_manager: ^0.2.4

  # Background playback (Premium):
  # - audio_service: registers a media-session so the OS surfaces a
  #   notification + lock-screen "now playing" tile, AirPods/headphone
  #   button events, Android Auto / CarPlay command intents.
  # - audio_session: handled inside `awatv_player` so the engine keeps
  #   audio decoding alive even when the app is backgrounded.
  audio_service: ^0.18.16
  audio_session: ^0.1.21

  # Platform plumbing (mDNS discovery, share sheet, OS settings deep
  # links, network info). Each plugin is mobile/desktop only — web/TV
  # codepaths short-circuit before reaching the native call. See
  # `lib/src/shared/discovery/*` and `lib/src/shared/network/*` for the
  # platform-guarded providers.
  bonsoir: ^5.1.10
  share_plus: ^10.1.2
  app_settings: ^5.1.1
  network_info_plus: ^6.1.1

  # Offline VOD downloads — survives app suspension on iOS/Android
  # (background URLSession + WorkManager respectively) and persists
  # the queue across cold starts. The mobile UI talks to this package
  # directly through the awatv_core DownloadsService for sandbox path
  # resolution. The audit prompt asked for ^5.8.0 but pub.dev never
  # published a 5.x line — the package jumped straight from 4.x to
  # 8.x and is now on 9.5.x at the time of writing. We pin to the
  # current major to stay on a maintained release.
  background_downloader: ^9.5.0

  # YouTube trailer playback. Powers the "Fragman" button on VOD /
  # series detail screens. iOS / Android / web are all supported by
  # the package directly; macOS / Windows fall back to a webview the
  # package wires up under the hood.
  youtube_player_flutter: ^9.1.1

  # User-facing local-file picker for the "Yukle" affordance in the
  # player track picker (load an .srt from disk). Cross-platform:
  # native on iOS / Android / macOS / Windows / Linux, file input on
  # web. Already a transitive dep of media_kit's web stack; pinning
  # explicitly so the version lockfile stays predictable.
  file_selector: ^1.0.3

  # Local notifications — wired up by the EPG "Hatirlat" / reminders
  # feature. The OS schedules a notification 5 min before the
  # programme start so the user has time to switch to the channel.
  # `timezone` is a mandatory peer dependency of
  # `flutter_local_notifications` for reliable IANA-zone scheduling.
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # Native Picture-in-Picture on Android. The package wraps the
  # `enterPictureInPictureMode` API on Android 8+ (Oreo / API 26) and
  # exposes a Flutter widget that re-lays itself out for the compact
  # PiP frame. iOS is handled separately via a method channel that
  # drives AVPictureInPictureController against media_kit's underlying
  # AVPlayer surface. The plugin is a no-op on web / desktop / TV — we
  # call it only after `Platform.isAndroid` short-circuits.
  floating: ^5.0.0

  # Voice search — wraps the platform speech-to-text engines:
  #   * iOS / macOS  → SFSpeechRecognizer (system Siri infrastructure)
  #   * Android       → SpeechRecognizer via Google services
  #   * Web           → Web Speech API (Chromium-based browsers only)
  # Used by the search bar mic button so users can dictate channel /
  # film / dizi names in Turkish (`tr_TR`) instead of typing on a TV
  # remote or an on-screen keyboard. Permission prompts surface on
  # first listen via `available()` — never on app boot.
  speech_to_text: ^7.0.0

  # Firebase production-readiness suite. All four are *opt-in* — the
  # native plugins won't activate until `GoogleService-Info.plist`
  # (iOS) / `google-services.json` (Android) ship in the platform
  # folders. Boot is wrapped in try/catch in `awatv_observability.dart`
  # and `app_remote_config.dart` so a missing config is a no-op and the
  # app keeps working on web / macOS / Windows / Linux desktop where
  # we don't currently bundle the Firebase native bindings.
  #
  #   * firebase_core           — root app handle, required by everything
  #   * firebase_crashlytics    — production crash reports (gated by user opt-in)
  #   * firebase_remote_config  — server-driven feature flags + paywall A/B
  #   * firebase_analytics      — opt-in usage telemetry; needed by RC for
  #                               variant attribution.
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3
  firebase_remote_config: ^5.1.3
  firebase_analytics: ^11.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  # End-to-end smoke tests under apps/mobile/integration_test/. Runs
  # in headless mode via `flutter test integration_test/`.
  integration_test:
    sdk: flutter
  # Mock-based test doubles for the Riverpod provider overrides used
  # by the integration suite (Dio interceptor stubs, in particular).
  # awatv_core already pulls in 1.0.4; we re-declare here so the
  # mobile workspace surfaces a clean dev-dependency graph.
  mocktail: ^1.0.4
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.4
  flutter_lints: ^6.0.0
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/tray/
  # Custom fonts can be added here later (Inter / Manrope recommended for sleek UI)
