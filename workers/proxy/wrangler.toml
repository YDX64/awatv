name = "awa-proxy"
main = "src/index.js"
compatibility_date = "2026-04-27"

# Provider intelligence overrides.
#
# DEFAULT_UA  Fallback User-Agent used when no fingerprint matches the
#             upstream host. Defaults to VLC/3.0.20 (in code).
# UA_OVERRIDE_<id>
#             Per-fingerprint User-Agent override (id matches the
#             PROVIDER_PROFILES entry, e.g. UA_OVERRIDE_smarters_pro).
#             Useful for swapping in a freshly-discovered UA without a
#             code redeploy. Underscores are converted to dashes when
#             matching the fingerprint id at runtime.
[vars]
DEFAULT_UA = "VLC/3.0.20 LibVLC/3.0.20"

