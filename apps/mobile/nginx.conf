# AWAtv web nginx config — single-file, drop into /etc/nginx/conf.d/.
#
# PWA-tuned cache strategy:
#   - Hashed assets under /assets, /canvaskit  -> 1y immutable
#   - Service worker, manifest, bootstrap      -> always revalidate
#   - index.html                               -> always revalidate (entry)
#
# CSP is permissive on connect/media so user-supplied IPTV URLs (any
# http/https origin) work; XHR / fetch / hls.js can hit anything they
# need to reach a stream.

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    root         /usr/share/nginx/html;
    index        index.html;

    # SPA: every route falls back to index.html so go_router deep links work.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Hashed asset bundles — long-cache, immutable.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
    location /canvaskit/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
    location ~* \.(woff2?|ttf|otf)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Hot files — never cache.
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "fullscreen=(self), autoplay=(self), picture-in-picture=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https: http:; media-src 'self' blob: https: http:; connect-src 'self' https: http: wss: ws:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net; font-src 'self' data:; manifest-src 'self'; worker-src 'self' blob:; frame-ancestors 'self';" always;

    # Compression
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;
    gzip_vary on;

    # Body size for any future POST endpoints
    client_max_body_size 25m;

    # Hide nginx version
    server_tokens off;
}
