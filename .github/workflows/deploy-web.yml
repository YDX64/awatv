name: deploy-web

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.41.7

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://awatv.pages.dev
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Resolve workspace dependencies
        run: flutter pub get

      - name: Run code generation
        run: |
          (cd packages/awatv_core && dart run build_runner build --delete-conflicting-outputs)
          (cd apps/mobile && dart run build_runner build --delete-conflicting-outputs)

      - name: Inject TMDB key into .env
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          cd apps/mobile
          {
            echo "TMDB_API_KEY=${TMDB_API_KEY}"
            cat .env.example | grep -v '^TMDB_API_KEY=' | grep -v '^$'
          } > .env

      - name: Build web (release, offline-first PWA)
        run: |
          cd apps/mobile
          flutter build web \
            --release \
            --pwa-strategy=offline-first \
            --no-tree-shake-icons \
            --base-href=/

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: awatv-web
          path: apps/mobile/build/web

      # ------------------------------------------------------------------
      # Cloudflare Pages deploy — conditional on CLOUDFLARE_API_TOKEN secret.
      # Without the token we still upload the build artifact above so it is
      # downloadable from the Actions UI for manual `wrangler pages deploy`
      # from a workstation; the workflow does NOT fail in that case.
      # ------------------------------------------------------------------
      - name: Probe Cloudflare credentials
        id: cf
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_TOKEN" ] && [ -n "$CF_ACCOUNT" ]; then
            echo "have_creds=true" >> "$GITHUB_OUTPUT"
            echo "Cloudflare credentials present; will deploy."
          else
            echo "have_creds=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set; skipping Pages deploy. Build artifact uploaded for manual deploy."
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.have_creds == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/mobile/build/web --project-name=awatv --branch=main --commit-dirty=true

      - name: Smoke check live site
        if: steps.cf.outputs.have_creds == 'true'
        run: |
          # Cloudflare's edge takes a few seconds to propagate after deploy
          sleep 10
          curl -fsSL --max-time 20 https://awatv.pages.dev/ | grep -qi "AWAtv\|awatv" || \
            (echo "::error::Smoke check failed — https://awatv.pages.dev/ does not show AWAtv title" && exit 1)
          echo "Smoke check passed."
