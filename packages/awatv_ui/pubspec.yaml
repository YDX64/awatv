name: awatv_ui
description: AWAtv shared design system — theme, tokens, custom widgets, animations.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  # Inter font for the Streas-aligned typography ramp. google_fonts
  # caches the ttf in the app's filesystem on first launch and falls
  # back to a system-default font while loading, so cold-start UI
  # never flashes a different metric. Apache-2.0 licensed.
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^7.0.0
